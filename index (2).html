<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>DCC — Elegibilidade do Tomador | Bloxs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px}
.login-logo{background:#1A2F5A;color:#fff;padding:.75rem 1.25rem;border-radius:10px;margin-bottom:1.5rem;display:inline-flex;align-items:center;gap:8px}
.login-logo span{font-size:13px;font-weight:600}
.login-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,.2)}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:4px}
.login-box p{font-size:13px;color:#64748b;margin-bottom:1.5rem}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.lf label{font-size:12px;color:#64748b;font-weight:500}
.lf input{padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;background:#fff;color:#0f172a;font-family:inherit;width:100%}
.lf input:focus{outline:none;border-color:#1A2F5A}
.login-btn{width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#1A2F5A;color:#fff;font-family:inherit;margin-top:4px}
.login-btn:hover{opacity:.9}
.login-err{font-size:13px;color:#991b1b;background:#fee2e2;padding:8px 12px;border-radius:8px;margin-top:12px;display:none}
/* FORM */
.wrap{max-width:820px;margin:0 auto;padding:2rem 1rem 5rem;display:none}
.hdr{background:#1A2F5A;color:#fff;padding:1.25rem 1.5rem;border-radius:12px;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center}
.hdr-left h1{font-size:18px;font-weight:600;margin:0}
.hdr-left p{font-size:12px;opacity:.75;margin-top:3px}
.hdr-user{display:flex;align-items:center;gap:10px}
.hdr-user span{font-size:12px;opacity:.8}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;cursor:pointer;font-family:inherit}
.logout-btn:hover{background:rgba(255,255,255,.1)}
.steps{display:flex;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:1.5rem;background:#fff}
.stp{flex:1;padding:10px 4px;text-align:center;font-size:11px;cursor:pointer;border-right:1px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:background .15s}
.stp:last-child{border-right:none}
.stp.on{background:#fff;color:#0f172a;font-weight:600}
.stp.ok{background:#f0fdf4;color:#15803d}
.stp span{display:block;font-size:10px;color:#94a3b8;margin-bottom:2px}
.sec{display:none}.sec.on{display:block}
.st{font-size:17px;font-weight:600;margin-bottom:4px}
.sd{font-size:13px;color:#64748b;margin-bottom:1.25rem}
.sub{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 .75rem;padding-bottom:4px;border-bottom:1px solid #e2e8f0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g1{display:grid;grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;color:#64748b;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;background:#fff;color:#0f172a;font-family:inherit}
.fg textarea{resize:vertical;min-height:72px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px}
.ct{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.cn{font-size:11px;font-weight:600;color:#94a3b8;min-width:28px;padding-top:2px}
.cb{flex:1}
.ctit{font-size:14px;margin-bottom:4px;line-height:1.5}
.cev{font-size:12px;color:#64748b;line-height:1.5}
.tb{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;margin-left:7px;vertical-align:middle}
.te{background:#fee2e2;color:#991b1b}
.tq{background:#dbeafe;color:#1e40af}
.tl{background:#fef3c7;color:#92400e}
.cr{display:grid;gap:8px;align-items:start}
.cr3{grid-template-columns:1fr 1fr 90px}
.cr2{grid-template-columns:1fr 1fr}
.ss{padding:7px 8px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;width:100%;font-family:inherit}
.ss.ap{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.ss.pa{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.ss.rp{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.oi{padding:7px 8px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;width:100%;font-family:inherit}
.pts{font-size:12px;text-align:center;padding:7px 4px;color:#64748b}
.sb{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.mts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1rem}
.mt{background:#f8fafc;border-radius:8px;padding:.75rem}
.ml{font-size:11px;color:#64748b;margin-bottom:4px}
.mv{font-size:22px;font-weight:600}
.bw{height:10px;background:#e2e8f0;border-radius:100px;overflow:hidden;margin-bottom:1rem}
.bf{height:100%;border-radius:100px;transition:width .3s}
.vd{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;text-align:center;margin-bottom:.75rem}
.sp{text-align:center;margin-top:.5rem}
.spv{display:inline-block;font-size:17px;font-weight:600;padding:8px 20px;border-radius:10px;background:#dbeafe;color:#1e40af}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1rem;border-top:1px solid #e2e8f0}
.btn{padding:9px 22px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #cbd5e1;background:#fff;color:#0f172a;font-family:inherit}
.btnp{background:#1A2F5A;color:#fff;border-color:#1A2F5A}
.btn:hover{opacity:.85}
.sst{font-size:13px;color:#64748b}
.tst{position:fixed;bottom:20px;right:20px;background:#1A2F5A;color:#fff;aldol:10px 18px;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.tst.on{opacity:1}
@media(max-width:600px){.g2{grid-template-columns:1fr}.mts{grid-template-columns:1fr 1fr}.cr3{grid-template-columns:1fr 1fr}}
</style>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">

    <div class="login-logo">
      <span>Bloxs Capital Partners</span>
      <span class="login-badge">DCC</span>
    </div>

<div class="wrap" id="form-wrap">

      <button class="logout-btn" onclick="doLogout()">Sair</button>

  <div class="steps" id="steps"></div>
  <div id="secs"></div>
  <div class="nav">
    <button class="btn" id="bprev" onclick="nav(-1)">Anterior</button>
    <span class="sst" id="sst"></span>
    <button class="btn btnp" id="bnext" onclick="nav(1)">Proximo</button>
  </div>
</div>

// ── Auth state ───────────────────────────────────────────────────────────────
var analista = null;

async function doLogin(){
  var email=document.getElementById('login-email').value.trim();
  var senha=document.getElementById('login-senha').value;
  var err=document.getElementById('login-err');
  err.style.display='none';
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';err.style.display='block';return;}
  var hash=md5(senha);
  try{
    var r=await fetch(SB+'/rest/v1/analistas?email=eq.'+encodeURIComponent(email)+'&senha_hash=eq.'+hash+'&ativo=eq.true&select=id,nome,email',{headers:HDR});
    var data=await r.json();
    if(!data||data.length===0){err.textContent='E-mail ou senha incorretos.';err.style.display='block';return;}
    analista=data[0];
    sessionStorage.setItem('dcc_analista',JSON.stringify(analista));
    showForm();
  }catch(e){err.textContent='Erro de conexão. Tente novamente.';err.style.display='block';}
}

function doLogout(){
  sessionStorage.removeItem('dcc_analista');
  analista=null;
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('form-wrap').style.display='none';
}

function showForm(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('form-wrap').style.display='block';
  document.getElementById('hdr-nome').textContent=analista.nome;
  if(!built){bsteps();build();go(0);built=true;}
}

// Check session on load
window.addEventListener('load',function(){
  var saved=sessionStorage.getItem('dcc_analista');
  if(saved){try{analista=JSON.parse(saved);showForm();}catch(e){}}
});

{sec:'s5',num:'5.1',titulo:'KYC completo de socios >= 20%',tipo:'EL',elim:true,ev:'Doc identidade + selfie biometrica via AiPrise/Sumsub',pts:8,val:false},
{sec:'s5',num:'5.2',titulo:'Ausentes de sancoes internacionais OFAC/ONU/UE',tipo:'EL',elim:true,ev:'Relatorio screening AML - Rise Finance',pts:8,val:false},

{sec:'s6',num:'6.2',titulo:'Representante legal com poderes plenos para assinar',tipo:'EL',elim:true,ev:'Contrato social / procuracao com poderes expressos',pts:5,val:false},
{sec:'s6',num:'6.3',titulo:'Aceite formal das condicoes do Protocolo DCC',tipo:'EL',elim:true,ev:'Termo de aceite das condicoes comerciais assinado',pts:5,val:false},
{sec:'s6',num:'6.4',titulo:'Responsavel tecnico designado para Rise/Utila',tipo:'QL',elim:false,ev:'Nome, cargo, email e telefone do responsavel',pts:3,val:false},
{sec:'s6',num:'6.5',titulo:'Historico no mercado de capitais (se houver)',tipo:'QL',elim:false,ev:'CRI, CRA, debentures, FIDCs anteriores',pts:3,val:false}
];
var TOTAL=CR.reduce(function(a,c){return a+c.pts},0);
var SECS=['ficha','s1','s2','s3','s4','s5','s6','score'];
var SL=['Ficha','1.Juridico','2.Financeiro','3.Colateral','4.Penhor','5.Compliance','6.Operacional','Score'];
var KM={'1.1':'s1_1','1.2':'s1_2','1.3':'s1_3','1.4':'s1_4','1.5':'s1_5','1.6':'s1_6','2.1':'s2_1','2.2':'s2_2','2.3':'s2_3','2.4':'s2_4','2.5':'s2_5','2.6':'s2_6','2.7':'s2_7','3.1':'s3_1','3.2':'s3_2','3.3':'s3_3','3.4':'s3_4','3.5':'s3_5','3.6':'s3_6','4.1':'s4_1','4.2':'s4_2','4.3':'s4_3','4.4':'s4_4','4.5':'s4_5','5.1':'s5_1','5.2':'s5_2','5.3':'s5_3','5.4':'s5_4','5.5':'s5_5','6.1':'s6_1','6.2':'s6_2','6.3':'s6_3','6.4':'s6_4','6.5':'s6_5'};
var cur=0,rid=null,built=false,st={},fi={};
CR.forEach(function(c){st[c.num+'_s']='N/A';st[c.num+'_o']='';if(c.val)st[c.num+'_v']='';});

function sc(){var t=0,e=0;CR.forEach(function(c){var s=st[c.num+'_s']||'N/A';if(s==='AP')t+=c.pts;else if(s==='PA')t+=Math.round(c.pts*.5);if(c.elim&&s==='RP')e++;});var p=Math.round(t/TOTAL*100);var v,sp,vc;if(e>0){v='Reprovado - eliminatorio(s) reprovado(s)';sp='-';vc='#991b1b';}else if(p>=85){v='Aprovacao direta';sp='DI + 4,0% a.a.';vc='#065f46';}else if(p>=70){v='Aprovacao padrao';sp='DI + 5,5% a.a.';vc='#065f46';}else if(p>=55){v='Comite de credito';sp='DI + 7,0% a.a.';vc='#92400e';}else if(p>=40){v='Aprovacao condicional';sp='DI + 9,0% a.a.';vc='#92400e';}else{v='Reprovado - score insuficiente';sp='-';vc='#991b1b';}return{t:t,p:p,e:e,v:v,sp:sp,vc:vc};}
function bsteps(){var h='';for(var i=0;i<SECS.length;i++){h+='<div class="stp'+(i===cur?' on':i<cur?' ok':'')+'" onclick="go('+i+')"><span>'+(i+1)+'</span>'+SL[i]+'</div>';}document.getElementById('steps').innerHTML=h;}
function inp(k,l,t,p){return '<div class="fg"><label>'+l+'</label><input type="'+t+'" placeholder="'+p+'" oninput="fi.'+k+'=this.value"></div>';}
function sel(k,l,opts){return '<div class="fg"><label>'+l+'</label><select onchange="fi.'+k+'=this.value">'+opts.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select></div>';}
function ta(k,l){return '<div class="fg"><label>'+l+'</label><textarea oninput="fi.'+k+'=this.value"></textarea></div>';}
function fichaH(){return '<p class="st">Identificacao do tomador</p><p class="sd">Dados cadastrais, operacao e colateral.</p><p class="sub">Dados cadastrais</p><div class="g2">'+inp('razao_social','Razao Social *','text','Ex: Cash Investments Ltda')+inp('cnpj','CNPJ *','text','00.000.000/0000-00')+inp('nome_fantasia','Nome fantasia','text','')+inp('data_abertura','Data de abertura','date','')+inp('atividade_principal','CNAE principal','text','')+inp('website','Website','text','')+'</div><p class="sub">Representante legal</p><div class="g2">'+inp('representante_nome','Nome completo *','text','')+inp('representante_cpf','CPF *','text','')+inp('representante_cargo','Cargo','text','')+inp('representante_email','E-mail','email','')+inp('representante_telefone','Telefone','text','')+'</div><p class="sub">Dados da operacao</p><div class="g2">'+sel('modalidade','Modalidade',['DCC Full - Penhor 200% + USDC 20%','DCC Lite - 100% USDC'])+inp('valor_solicitado','Valor total (R$)','number','2500000')+inp('numero_tranches','Tranches','number','2')+inp('prazo_meses','Prazo (meses)','number','18')+'</div><div class="g1" style="margin-top:12px">'+ta('finalidade','Finalidade dos recursos')+'</div><p class="sub">Colateral digital</p><div class="g2">'+inp('exchange_wallet','Exchange/wallet USDC','text','Ex: Binance')+inp('valor_usdc','Valor USDC disponivel','number','')+inp('data_extrato_usdc','Data do extrato','date','')+inp('canal_aquisicao_usdc','Canal de aquisicao','text','')+'</div>';}
function critH(sid){var idx=SECS.indexOf(sid);var items=CR.filter(function(c){return c.sec===sid;});var h='<p class="st">'+SL[idx]+'</p><p class="sd">Avalie cada criterio e registre a evidencia.</p>';items.forEach(function(c){var tb=c.tipo==='EL'?'te':c.tipo==='QT'?'tq':'tl';var tl=c.tipo==='EL'?'ELIMINATORIO':c.tipo==='QT'?'QUANTITATIVO':'QUALITATIVO';var cn=c.num.replace('.','_');h+='<div class="card"><div class="ct"><span class="cn">'+c.num+'</span><div class="cb"><div class="ctit"'+(c.elim?' style="font-weight:600"':'')+'>'+c.titulo+'<span class="tb '+tb+'">'+tl+'</span></div><div class="cev">Evidencia: '+c.ev+' &middot; <strong>'+c.pts+' pts</strong></div></div></div><div class="cr '+(c.val?'cr3':'cr2')+'"><select class="ss" id="ss'+cn+'" onchange="upd(\''+c.num+'\',this)"><option value="N/A">N/A</option><option value="AP">Aprovado</option><option value="PA">Parcial</option><option value="RP">Reprovado</option></select><input class="oi" placeholder="Observacao..." oninput="st[\''+c.num+'_o\']=this.value">'+(c.val?'<input class="oi" placeholder="'+c.vl+'" oninput="st[\''+c.num+'_v\']=this.value">':'<span class="pts" id="pts'+cn+'">- pts</span>')+'</div></div>';});return h;}
function scoreH(){return '<p class="st">Score e veredicto</p><p class="sd">Resultado final da analise de elegibilidade.</p><div class="sb" id="sb"></div><div class="fg" style="margin-top:1rem"><label>Observacoes finais</label><textarea style="min-height:100px" oninput="st.obs_finais=this.value"></textarea></div>';}
function rScore(){var s=sc();var el=document.getElementById('sb');if(!el)return;el.innerHTML='<div class="mts"><div class="mt"><div class="ml">Pontos obtidos</div><div class="mv" style="color:'+s.vc+'">'+s.t+'</div></div><div class="mt"><div class="ml">Total possivel</div><div class="mv">'+TOTAL+'</div></div><div class="mt"><div class="ml">Score</div><div class="mv" style="color:'+s.vc+'">'+s.p+'%</div></div><div class="mt"><div class="ml">Eliminatorios reprovados</div><div class="mv" style="color:'+(s.e>0?'#991b1b':'#065f46')+'">'+s.e+'</div></div></div><div class="bw"><div class="bf" style="width:'+s.p+'%;background:'+s.vc+'"></div></div><div class="vd" style="background:'+s.vc+'22;color:'+s.vc+'">'+s.v+'</div>'+(s.sp!=='-'?'<div class="sp"><span class="spv">Spread sugerido: '+s.sp+'</span></div>':'');}
function build(){var c=document.getElementById('secs');c.innerHTML='';for(var i=0;i<SECS.length;i++){var sid=SECS[i];var d=document.createElement('div');d.className='sec'+(i===cur?' on':'');if(sid==='ficha')d.innerHTML=fichaH();else if(sid==='score')d.innerHTML=scoreH();else d.innerHTML=critH(sid);c.appendChild(d);if(sid==='score'&&i===cur)rScore();}}
function upd(num,el){st[num+'_s']=el.value;el.className='ss'+(el.value==='AP'?' ap':el.value==='PA'?' pa':el.value==='RP'?' rp':'');var cn=num.replace('.','_');var pe=document.getElementById('pts'+cn);var c=CR.find(function(x){return x.num===num;});if(pe&&c){var p=el.value==='AP'?c.pts:el.value==='PA'?Math.round(c.pts*.5):0;pe.textContent=(el.value==='N/A'?'-':p)+' pts';}}
function go(i){cur=i;var ss=document.querySelectorAll('.sec');for(var j=0;j<ss.length;j++)ss[j].className='sec'+(j===cur?' on':'');bsteps();document.getElementById('bprev').style.visibility=cur===0?'hidden':'visible';document.getElementById('bnext').textContent=cur===SECS.length-1?(rid?'Atualizar':'Salvar no Supabase'):'Proximo';if(SECS[cur]==='score')rScore();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){if(cur===SECS.length-1&&d===1){save();return;}go(Math.max(0,Math.min(SECS.length-1,cur+d)));}
function toast(m){var t=document.getElementById('tst');t.textContent=m;t.className='tst on';setTimeout(function(){t.className='tst';},3000);}

async function save(){
  if(!analista){toast('Sessao expirada. Faca login novamente.');doLogout();return;}
  document.getElementById('sst').textContent='Salvando...';
  var s=sc();
  var p={
    analista_id: analista.id,
    analista_nome: analista.nome,
    analista_email: analista.email,
    razao_social: fi.razao_social||null,
    nome_fantasia: fi.nome_fantasia||null,
    cnpj: fi.cnpj||null,
    data_abertura: fi.data_abertura||null,
    atividade_principal: fi.atividade_principal||null,
    website: fi.website||null,
    representante_nome: fi.representante_nome||null,
    representante_cpf: fi.representante_cpf||null,
    representante_cargo: fi.representante_cargo||null,
    representante_email: fi.representante_email||null,
    representante_telefone: fi.representante_telefone||null,
    modalidade: fi.modalidade||'DCC Full - Penhor 200% + USDC 20%',
    valor_solicitado: fi.valor_solicitado?Number(fi.valor_solicitado):null,
    numero_tranches: fi.numero_tranches?Number(fi.numero_tranches):null,
    prazo_meses: fi.prazo_meses?Number(fi.prazo_meses):null,
    finalidade: fi.finalidade||null,
    exchange_wallet: fi.exchange_wallet||null,
    valor_usdc: fi.valor_usdc?Number(fi.valor_usdc):null,
    data_extrato_usdc: fi.data_extrato_usdc||null,
    canal_aquisicao_usdc: fi.canal_aquisicao_usdc||null,
    score_total: s.t,
    score_pct: s.p,
    eliminatorios_reprovados: s.e,
    veredicto: s.v,
    spread_sugerido: s.sp,
    observacoes_finais: st.obs_finais||null
  };
  Object.keys(KM).forEach(function(n){
    var col=KM[n];
    var raw=st[n+'_s']||'N/A';
    p[col+'_status']=raw==='AP'?'APROVADO':raw==='PA'?'PARCIAL':raw==='RP'?'REPROVADO':'N/A';
    p[col+'_obs']=st[n+'_o']||null;
    var c=CR.find(function(x){return x.num===n;});
    if(c&&c.val)p[col+'_valor']=st[n+'_v']||null;
  });
  try{
    var m=rid?'PATCH':'POST';
    var url=rid?SB+'/rest/v1/dcc_elegibilidade_tomadores?id=eq.'+rid:SB+'/rest/v1/dcc_elegibilidade_tomadores';
    var r=await fetch(url,{method:m,headers:Object.assign({},HDR,{'Prefer':'return=representation'}),body:JSON.stringify(rid?p:[p])});
    var data=await r.json();
    if(r.ok){
      if(!rid&&data[0]&&data[0].id)rid=data[0].id;
      document.getElementById('sst').textContent='Salvo as '+new Date().toLocaleTimeString('pt-BR');
      document.getElementById('bnext').textContent='Atualizar';
      toast('Salvo no Supabase');
    } else {
      document.getElementById('sst').textContent='Erro: '+JSON.stringify(data);
      toast('Erro ao salvar - veja o console');
      console.error('Supabase error:',data);
    }
  }catch(e){document.getElementById('sst').textContent='Erro de conexao';toast('Erro - verifique a conexao');console.error(e);}
}
</script>
