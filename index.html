*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
/* ── LOGIN ── */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.lbox{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.06)}

.llogo-name{font-size:15px;font-weight:700;color:#1A2F5A}
.llogo-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:#1A2F5A;color:#fff}
.lbox h2{font-size:20px;font-weight:700;margin-bottom:4px}
.lbox p{font-size:13px;color:#64748b;margin-bottom:1.5rem}
.lf{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.lf label{font-size:12px;font-weight:600;color:#475569}
.lf input{padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;width:100%;transition:border .15s}
.lf input:focus{outline:none;border-color:#1A2F5A}
.lbtn{width:100%;padding:11px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:#1A2F5A;color:#fff;margin-top:6px;transition:opacity .15s}
.lbtn:hover{opacity:.88}
.lerr{font-size:13px;color:#991b1b;background:#fee2e2;padding:8px 12px;border-radius:8px;margin-top:12px;display:none;border:1px solid #fca5a5}
.ldivider{text-align:center;font-size:12px;color:#94a3b8;margin:16px 0}
.lbtn-orig{width:100%;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid #1A2F5A;background:#fff;color:#1A2F5A;transition:background .15s}
.lbtn-orig:hover{background:#f8fafc}
/* ── FORM ── */
#app{display:none;max-width:860px;margin:0 auto;padding:1.5rem 1rem 5rem}
.hdr{background:#1A2F5A;color:#fff;padding:1.25rem 1.5rem;border-radius:12px;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:18px;font-weight:700;margin:0}
.hdr p{font-size:12px;opacity:.7;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-user{font-size:12px;opacity:.85}
.lout{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;font-family:inherit}
.lout:hover{background:rgba(255,255,255,.12)}
.steps{display:flex;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin-bottom:1.5rem;background:#fff}
.stp{flex:1;padding:9px 4px;text-align:center;font-size:10px;cursor:pointer;border-right:1px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:background .15s;line-height:1.4}
.stp:last-child{border-right:none}
.stp.on{background:#fff;color:#0f172a;font-weight:700}
.stp.ok{background:#f0fdf4;color:#15803d}
.stp b{display:block;font-size:9px;font-weight:400;color:#94a3b8;margin-bottom:1px}
.sec{display:none}.sec.on{display:block}
.stit{font-size:17px;font-weight:700;margin-bottom:4px}
.sdesc{font-size:13px;color:#64748b;margin-bottom:1.25rem}
.sub{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 .75rem;padding-bottom:4px;border-bottom:1px solid #e2e8f0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g1{display:grid;grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:600;color:#475569}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;color:#0f172a;font-family:inherit;transition:border .15s}

.ct{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.cn{font-size:11px;font-weight:700;color:#94a3b8;min-width:28px;padding-top:2px}
.cb{flex:1}
.ctit{font-size:14px;margin-bottom:4px;line-height:1.5}
.cev{font-size:12px;color:#64748b;line-height:1.5}
.tb{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:7px;vertical-align:middle}
.te{background:#fee2e2;color:#991b1b}.tq{background:#dbeafe;color:#1e40af}.tl{background:#fef3c7;color:#92400e}
.cr{display:grid;gap:8px;align-items:start}
.cr3{grid-template-columns:1fr 1fr 100px}.cr2{grid-template-columns:1fr 1fr}

.pts{font-size:12px;text-align:center;padding:7px 4px;color:#64748b;font-weight:600}
.sbx{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}

.ml{font-size:11px;color:#64748b;margin-bottom:4px;font-weight:600}
.mv{font-size:22px;font-weight:700}

.btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#0f172a;font-family:inherit;transition:all .15s}

// ── AUTH ─────────────────────────────────────────────────────────────────────
var USER = null; // {id, nome, email, tipo: 'analista'|'originador'}

async function login(){
  var email = document.getElementById('lemail').value.trim();
  var senha = document.getElementById('lsenha').value;
  var err   = document.getElementById('lerr');
  err.style.display = 'none';
  if(!email || !senha){err.textContent='Preencha e-mail e senha.';err.style.display='block';return;}
  var hash = md5(senha);
  try{
    var r = await fetch(SB+'/rest/v1/analistas?email=eq.'+encodeURIComponent(email)+'&senha_hash=eq.'+hash+'&ativo=eq.true&select=id,nome,email',{headers:H});
    var d = await r.json();
    if(!d||d.length===0){err.textContent='E-mail ou senha incorretos.';err.style.display='block';return;}
    USER = {id:d[0].id, nome:d[0].nome, email:d[0].email, tipo:'analista'};
    sessionStorage.setItem('dcc_user', JSON.stringify(USER));
    showApp();
  }catch(e){err.textContent='Erro de conexão. Tente novamente.';err.style.display='block';}
}

function entrarOriginator(){
  USER = {id:null, nome:'Originador', email:'', tipo:'originador'};
  sessionStorage.setItem('dcc_user', JSON.stringify(USER));
  showApp();
}

function logout(){
  sessionStorage.removeItem('dcc_user');
  USER = null; rid = null;
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
}

function showApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hdr-user').textContent = USER.nome + (USER.email ? ' · '+USER.email : '');
  document.getElementById('badge-orig').style.display = USER.tipo==='originador' ? 'inline-block' : 'none';
  if(!built){ buildSteps(); buildSecs(); goTo(0); built=true; }
}

window.addEventListener('load', function(){
  var s = sessionStorage.getItem('dcc_user');
  if(s){try{USER=JSON.parse(s); showApp();}catch(e){}}
});

var TOTAL = CR.reduce(function(a,c){return a+c.p},0);

var cur=0, rid=null, built=false;
var ST={}, FI={};
CR.forEach(function(c){ST[c.n+'_s']='N/A'; ST[c.n+'_o']=''; if(c.v)ST[c.n+'_v']='';});

// ── SCORE ────────────────────────────────────────────────────────────────────
function calcScore(){
  var t=0, e=0;
  CR.forEach(function(c){
    var s=ST[c.n+'_s']||'N/A';
    if(s==='AP')t+=c.p; else if(s==='PA')t+=Math.round(c.p*.5);
    if(c.el&&s==='RP')e++;
  });
  var p=Math.round(t/TOTAL*100);
  var v,sp,vc;
  if(e>0){v='Reprovado - eliminatorio(s) reprovado(s)';sp='--';vc='#991b1b';}
  else if(p>=85){v='Aprovacao direta';sp='DI + 4,0% a.a.';vc='#065f46';}
  else if(p>=70){v='Aprovacao padrao';sp='DI + 5,5% a.a.';vc='#065f46';}
  else if(p>=55){v='Comite de credito';sp='DI + 7,0% a.a.';vc='#92400e';}
  else if(p>=40){v='Aprovacao condicional';sp='DI + 9,0% a.a.';vc='#92400e';}
  else{v='Reprovado - score insuficiente';sp='--';vc='#991b1b';}
  return{t:t,p:p,e:e,v:v,sp:sp,vc:vc};
}

    var tl=c.tp==='EL'?'ELIMINATORIO':c.tp==='QT'?'QUANTITATIVO':'QUALITATIVO';
    var cn=c.n.replace('.','_');

      '<div class="cb"><div class="ctit"'+(c.el?' style="font-weight:700"':'')+'>'+c.t+
      '<span class="tb '+tb+'">'+tl+'</span></div>'+
      '<div class="cev">Evidencia: '+c.ev+' &middot; <strong>'+c.p+' pts</strong></div></div></div>'+
      '<div class="cr '+(c.v?'cr3':'cr2')+'">'+
      '<select class="ss" id="ss'+cn+'" onchange="updSt(\''+c.n+'\',this)">'+
        '<option value="N/A">N/A - Nao avaliado</option>'+
        '<option value="AP">Aprovado</option>'+
        '<option value="PA">Parcial (50%)</option>'+
        '<option value="RP">Reprovado</option>'+
      '</select>'+
      '<input class="oi" placeholder="Observacao / nota..." oninput="ST[\''+c.n+'_o\']=this.value">'+
      (c.v?'<input class="oi" placeholder="'+c.vl+'" oninput="ST[\''+c.n+'_v\']=this.value">':
           '<span class="pts" id="pts'+cn+'">-- pts</span>')+

  return '<p class="stit">Score e Veredicto Final</p>'+

function renderScore(){
  var s=calcScore();

  if(!el)return;

    '<div class="mts">'+
    '<div class="mt"><div class="ml">Pontos obtidos</div><div class="mv" style="color:'+s.vc+'">'+s.t+'</div></div>'+
    '<div class="mt"><div class="ml">Total possivel</div><div class="mv">'+TOTAL+'</div></div>'+
    '<div class="mt"><div class="ml">Score</div><div class="mv" style="color:'+s.vc+'">'+s.p+'%</div></div>'+
    '<div class="mt"><div class="ml">Eliminatorios reprov.</div><div class="mv" style="color:'+(s.e>0?'#991b1b':'#065f46')+'">'+s.e+'</div></div>'+
    '</div>'+
    '<div class="bw"><div class="bf" style="width:'+s.p+'%;background:'+s.vc+'"></div></div>'+
    '<div class="vd" style="background:'+s.vc+'22;color:'+s.vc+'">'+s.v+'</div>'+
    (s.sp!=='--'?'<div class="sprd"><span class="sval">Spread sugerido: '+s.sp+'</span></div>':'');

function buildSecs(){
  var c=document.getElementById('secs');
  c.innerHTML='';
  SECS.forEach(function(sid,i){
    var d=document.createElement('div');
    d.className='sec'+(i===cur?' on':'');
    d.id='sec'+i;
    if(sid==='ficha')d.innerHTML=fichaHTML();
    else if(sid==='score')d.innerHTML=scoreHTML();
    else d.innerHTML=critHTML(sid);
    c.appendChild(d);
  });

// ── EVENTS ───────────────────────────────────────────────────────────────────
function updSt(num, sel){
  ST[num+'_s']=sel.value;
  sel.className='ss'+(sel.value==='AP'?' ap':sel.value==='PA'?' pa':sel.value==='RP'?' rp':'');
  var pe=document.getElementById('pts'+num.replace('.','_'));
  var c=CR.find(function(x){return x.n===num;});
  if(pe&&c){
    var pts=sel.value==='AP'?c.p:sel.value==='PA'?Math.round(c.p*.5):0;
    pe.textContent=(sel.value==='N/A'?'--':pts)+' pts';
  }
}

function goTo(i){
  cur=i;
  document.querySelectorAll('.sec').forEach(function(el,j){el.className='sec'+(j===cur?' on':'');});
  document.querySelectorAll('.stp').forEach(function(el,j){el.className='stp'+(j===cur?' on':j<cur?' ok':'');});
  document.getElementById('bprev').style.visibility=cur===0?'hidden':'visible';
  document.getElementById('bnext').textContent=cur===SECS.length-1?(rid?'Atualizar registro':'Salvar no Supabase'):'Proximo';
  if(SECS[cur]==='score')renderScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function nav(d){
  if(cur===SECS.length-1&&d===1){saveData();return;}
  goTo(Math.max(0,Math.min(SECS.length-1,cur+d)));
}

function showToast(msg, isErr){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast on'+(isErr?' err-t':'');
  setTimeout(function(){t.className='toast';},3500);
}

// ── SAVE ─────────────────────────────────────────────────────────────────────
async function saveData(){
  var sst=document.getElementById('sst');
  sst.textContent='Salvando...'; sst.className='sst';

  var s=calcScore();

  // Payload mapeado exatamente contra as colunas confirmadas do banco
  var payload = {
    // ficha
    razao_social:        FI.razao_social        || null,
    nome_fantasia:       FI.nome_fantasia        || null,
    cnpj:                FI.cnpj                 || null,
    data_abertura:       FI.data_abertura        || null,
    atividade_principal: FI.atividade_principal  || null,
    website:             FI.website              || null,
    representante_nome:  FI.representante_nome   || null,
    representante_cpf:   FI.representante_cpf    || null,
    representante_cargo: FI.representante_cargo  || null,
    representante_email: FI.representante_email  || null,
    representante_telefone: FI.representante_telefone || null,
    modalidade:          FI.modalidade || 'DCC Full - Penhor 200% + USDC 20%',
    finalidade:          FI.finalidade           || null,
    exchange_wallet:     FI.exchange_wallet       || null,
    canal_aquisicao_usdc: FI.canal_aquisicao_usdc || null,
    // numericos
    valor_solicitado: FI.valor_solicitado ? parseFloat(FI.valor_solicitado) : null,
    numero_tranches:  FI.numero_tranches  ? parseInt(FI.numero_tranches)    : null,
    prazo_meses:      FI.prazo_meses      ? parseInt(FI.prazo_meses)        : null,
    valor_usdc:       FI.valor_usdc       ? parseFloat(FI.valor_usdc)       : null,
    // datas
    data_extrato_usdc: FI.data_extrato_usdc || null,
    // analista (colunas confirmadas no schema)
    analista_nome:  FI.analista_nome  || (USER ? USER.nome  : null),
    analista_email: FI.analista_email || (USER ? USER.email : null),
    analista_id:    (USER && USER.id) ? USER.id : null,
    // score
    score_total:             s.t,
    score_pct:               s.p,
    eliminatorios_reprovados: s.e,
    veredicto:               s.v,
    spread_sugerido:         s.sp !== '--' ? s.sp : null,
    observacoes_finais:      ST.obs || null
  };

  // criterios — status e obs
  Object.keys(KM).forEach(function(num){
    var col = KM[num];
    var raw = ST[num+'_s'] || 'N/A';
    payload[col+'_status'] = raw==='AP'?'APROVADO': raw==='PA'?'PARCIAL': raw==='RP'?'REPROVADO': 'N/A';
    payload[col+'_obs']    = ST[num+'_o'] || null;
    var c = CR.find(function(x){return x.n===num;});
    if(c && c.v) payload[col+'_valor'] = ST[num+'_v'] || null;
  });

  try{
    var method = rid ? 'PATCH' : 'POST';
    var url    = rid
      ? SB+'/rest/v1/dcc_elegibilidade_tomadores?id=eq.'+rid
      : SB+'/rest/v1/dcc_elegibilidade_tomadores';

    var resp = await fetch(url, {
      method:  method,
      headers: H,
      body:    JSON.stringify(rid ? payload : [payload])
    });

    var body = await resp.json();

    if(resp.ok){
      if(!rid && body[0] && body[0].id) rid = body[0].id;
      sst.textContent = 'Salvo as '+new Date().toLocaleTimeString('pt-BR');
      sst.className   = 'sst ok';
      document.getElementById('bnext').textContent = 'Atualizar registro';
      showToast('Registro salvo com sucesso!', false);
    } else {
      var msg = body && body.message ? body.message : JSON.stringify(body);
      sst.textContent = 'Erro: '+msg;
      sst.className   = 'sst err';
      showToast('Erro ao salvar: '+msg, true);
      console.error('Supabase error:', body);
    }
  }catch(ex){
    sst.textContent = 'Erro de conexao';
    sst.className   = 'sst err';
    showToast('Erro de conexao com o servidor', true);
    console.error(ex);
  }
}
